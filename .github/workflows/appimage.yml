jobs:
  build:
    runs-on: ${{ matrix.system.image }}
    steps:
      - uses: 'actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0'
        with:
          persist-credentials: false
      - name: 'Install yq'
        run: 'pipx install yq'
      - name: 'Install uv'
        uses: 'astral-sh/setup-uv@11f9893b081a58869d3b5fccaea48c9e9e46f990'
        with:
          enable-cache: false
      - name: 'Set up Python'
        uses: 'actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1'
        with:
          python-version: '3.13'
      - name: 'Install dependencies (uv)'
        run: |
          uv sync
          uv pip install python-appimage
          wget -O generic.svg 'https://raw.githubusercontent.com/KDE/breeze-icons/refs/heads/master/icons/preferences/32/preferences-other.svg'
        shell: 'bash'
      - name: 'Build with python-appimage'
        run: |
          project_name=$(tomlq -r '.project.urls.repository|split("/")[-1]' pyproject.toml)
          version=$(tomlq -r .project.version pyproject.toml)
          rm -fR dist
          mkdir dist
          while IFS=$' ' read -r script_name python_path func_name; do
              func_name="${func_name#"${func_name%%[![:space:]]*}"}"
              func_name="${func_name%"${func_name##*[![:space:]]}"}"
              rm -fR recipe
              mkdir recipe
              cat > recipe/entrypoint.sh <<EOF
          {{ python-executable }} \${APPDIR}/opt/python{{ python-version }}/bin/${script_name} "\$@"
          EOF
              chmod +x recipe/entrypoint.sh
              if [[ "${ACTIONS_RUNNER_DEBUG}" == 'true' ]]; then
                  cat recipe/entrypoint.sh
              fi
              cat > "recipe/${script_name}.desktop" <<EOF
          [Desktop Entry]
          Type=Application
          Name=${script_name}
          Icon=${script_name}
          Categories=Utility;
          Terminal=true
          X-AppImage-Version=${version}
          EOF
              if [[ "${ACTIONS_RUNNER_DEBUG}" == 'true' ]]; then
                  cat "recipe/${script_name}.desktop"
              fi
              cat > recipe/requirements.txt <<EOF
          $(pwd -P)
          EOF
              if [[ "${ACTIONS_RUNNER_DEBUG}" == 'true' ]]; then
                  cat recipe/requirements.txt
              fi
              cat > "recipe/${script_name}.appinfo.xml" <<EOF
          <?xml version="1.0" encoding="UTF-8"?>
          <component type="desktop-application">
            <id>${script_name}</id>
            <metadata_license>GFDL-1.3</metadata_license>
            <project_license>MIT</project_license>
            <name>${script_name}</name>
            <summary>${script_name} from ${project_name}</summary>
            <description>
              <p>${script_name} from ${project_name}. - ${{ github.server_url }}/${{ github.repository }}</p>
            </description>
            <launchable type="desktop-id">${script_name}.desktop</launchable>
            <url type="homepage">${{ github.server_url }}/${{ github.repository }}</url>
            <screenshots>
              <screenshot type="default">
                <image></image>
              </screenshot>
            </screenshots>
            <provides>
              <id>${script_name}.desktop</id>
            </provides>
          </component>
          EOF
              if [[ "${ACTIONS_RUNNER_DEBUG}" == 'true' ]]; then
                  cat "recipe/${script_name}.appinfo.xml"
              fi
              cp generic.svg "recipe/${script_name}.svg"
              echo "Building AppImage for '${script_name}'..."
              uv run python -m python_appimage -v build app -l "manylinux2014_${{ matrix.system.arch }}" -p 3.13 recipe
              mv "${script_name}-${{ matrix.system.arch }}.AppImage" "dist/${script_name}-v${version}-${{ matrix.system.arch }}.AppImage"
          done < <(tomlq -r '.project.scripts|to_entries[]|"\(.key) \(.value|split(":")|join(" "))"' pyproject.toml)
        shell: 'bash'
      - name: 'Test binary'
        run: |
          dist_files=(dist/*)
          echo "Found ${#dist_files[@]} files in dist/: ${dist_files[*]##*/}"
          for file in "${dist_files[@]}"; do
              if [[ "${file}" == dist/index.*js ]]; then
                  echo "Skipping index.js."
                  continue
              fi
              echo "Testing '${file}'."
              "./${file}" --help
          done
      - name: 'Upload Artifacts'
        uses: 'actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a'
        with:
          if-no-files-found: error
          name: patreon-archiver-binaries-linux-${{ matrix.system.arch }}
          path: |
            dist/*
      - name: 'Generate SBOM'
        uses: 'anchore/sbom-action@e22c389904149dbc22b58101806040fa8d37a610'
        env:
          SYFT_SOURCE_NAME: 'patreon-archiver'
          SYFT_SOURCE_VERSION: ${{ github.ref_name }}
        with:
          path: 'dist/'
          output-file: 'sbom.spdx.json'
          upload-artifact: false
      - name: 'Attest'
        uses: 'actions/attest@a1948c3f048ba23858d222213b7c278aabede763'
        with:
          subject-path: 'dist/*.AppImage'
      - name: 'Attest SBOM'
        uses: 'actions/attest@a1948c3f048ba23858d222213b7c278aabede763'
        with:
          subject-path: 'dist/*.AppImage'
          sbom-path: 'sbom.spdx.json'
      - if: github.ref_type == 'tag'
        name: Create or update draft release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "$GITHUB_REF_NAME" --draft --notes '' dist/*.AppImage ||
            gh release upload "$GITHUB_REF_NAME" dist/*.AppImage --clobber
    strategy:
      matrix:
        system:
          - { arch: aarch64, image: ubuntu-24.04-arm }
          - { arch: x86_64, image: ubuntu-latest }
name: 'AppImage'
'on':
  push:
    branches:
      - 'master'
    paths:
      - 'patreon_archiver/**'
      - '.github/workflows/appimage.yml'
      - 'pyproject.toml'
      - 'uv.lock'
      - 'poetry.lock'
    tags:
      - 'v*.*.*'
permissions:
  attestations: 'write'
  contents: 'write'
  id-token: 'write'
