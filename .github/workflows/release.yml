jobs:
  publish-release:
    if: |
      github.event.workflow_run.conclusion == 'success' &&
      github.event.workflow_run.head_branch &&
      startsWith(github.event.workflow_run.head_branch, 'v')
    runs-on: 'ubuntu-latest'
    steps:
      - uses: 'actions/checkout@v6'
      - env:
          GH_TOKEN: '${{ github.token }}'
        name: 'Check all workflows succeeded'
        run: |
          tag="${{ github.event.workflow_run.head_branch }}"
          sha="${{ github.event.workflow_run.head_sha }}"
          for workflow in AppImage Publish PyInstaller Snap; do
            status=$(gh run list -w "$workflow" --commit "$sha" --json conclusion -q '.[0].conclusion')
            if [[ "$status" != 'success' ]]; then
              echo "Workflow '$workflow' has not succeeded yet (status: ${status:-pending})."
              exit 1
            fi
          done
          echo "All workflows succeeded for ${tag}."
          echo "tag=${tag}" >> "$GITHUB_ENV"
      - env:
          GH_TOKEN: '${{ github.token }}'
        name: 'Publish release'
        run: 'gh release edit "$tag" --draft=false'
name: 'Release'
'on':
  workflow_run:
    types:
      - 'completed'
    workflows:
      - 'AppImage'
      - 'Publish'
      - 'PyInstaller'
      - 'Snap'
permissions:
  contents: 'write'
