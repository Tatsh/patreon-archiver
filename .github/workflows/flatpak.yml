jobs:
  build:
    container:
      image: 'ghcr.io/flathub-infra/flatpak-github-actions:freedesktop-24.08'
      options: '--privileged'
    runs-on: '${{ matrix.system.image }}'
    steps:
      - uses: 'actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0'
        with:
          persist-credentials: false
      - id: 'flatpak_bundle'
        name: 'Set Flatpak bundle filename'
        run: |
          version=$(python3 -c "import tomllib; print(tomllib.load(open('pyproject.toml', 'rb'))['project']['version'])")
          echo "version=${version}" >> "$GITHUB_OUTPUT"
          echo "filename=sh.tat.patreon-archiver-${version}-${{ matrix.system.arch }}.flatpak" >> "$GITHUB_OUTPUT"
      - name: 'Build Flatpak'
        uses: 'flatpak/flatpak-github-actions/flatpak-builder@401fe28a8384095fc1531b9d320b292f0ee45adb'
        with:
          arch: '${{ matrix.system.arch }}'
          bundle: '${{ steps.flatpak_bundle.outputs.filename }}'
          manifest-path: 'sh.tat.patreon-archiver.yml'
      - name: 'Upload Artifacts'
        uses: 'actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a'
        with:
          if-no-files-found: 'error'
          name: 'sh.tat.patreon-archiver-${{ steps.flatpak_bundle.outputs.version }}-${{ matrix.system.arch }}'
          path: '${{ steps.flatpak_bundle.outputs.filename }}'
      - name: 'Attest'
        uses: 'actions/attest@a1948c3f048ba23858d222213b7c278aabede763'
        with:
          subject-path: '${{ steps.flatpak_bundle.outputs.filename }}'
      - env:
          FILE: '${{ steps.flatpak_bundle.outputs.filename }}'
          GH_TOKEN: '${{ github.token }}'
        if: "github.ref_type == 'tag'"
        name: 'Create or update draft release'
        run: |
          gh release create "$GITHUB_REF_NAME" --draft --notes '' "$FILE" ||
            gh release upload "$GITHUB_REF_NAME" "$FILE" --clobber
    strategy:
      matrix:
        system:
          - arch: 'x86_64'
            image: 'ubuntu-latest'
          - arch: 'aarch64'
            image: 'ubuntu-24.04-arm'
name: 'Flatpak'
'on':
  push:
    branches:
      - 'master'
    paths:
      - 'patreon_archiver/**'
      - '.github/workflows/flatpak.yml'
      - 'sh.tat.patreon-archiver.yml'
      - 'pyproject.toml'
      - 'uv.lock'
      - 'poetry.lock'
    tags:
      - 'v*.*.*'
  workflow_dispatch: null
permissions:
  attestations: 'write'
  contents: 'write'
  id-token: 'write'
