jobs:
  format:
    runs-on: 'ubuntu-latest'
    steps:
      - uses: 'actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0'
        with:
          persist-credentials: false
      - name: 'Install uv'
        uses: 'astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39'
      - name: 'Set up Python'
        uses: 'actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1'
        with:
          python-version: '3.10'
      - name: 'Install dependencies (uv)'
        run: 'uv sync --group dev --all-extras'
      - name: 'Check formatting (YAPF)'
        run: 'uv run yapf --diff --parallel --recursive .'
  mypy:
    runs-on: 'ubuntu-latest'
    steps:
      - uses: 'actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0'
        with:
          persist-credentials: false
      - name: 'Install uv'
        uses: 'astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39'
      - name: 'Set up Python'
        uses: 'actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1'
        with:
          python-version: '3.14'
      - name: 'Install dependencies (uv)'
        run: 'uv sync --group dev --group tests --all-extras'
      - name: 'Lint with mypy'
        run: 'uv run mypy .'
  pyright:
    runs-on: 'ubuntu-latest'
    steps:
      - uses: 'actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0'
        with:
          persist-credentials: false
      - name: 'Install uv'
        uses: 'astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39'
      - name: 'Set up Python'
        uses: 'actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1'
        with:
          python-version: '3.14'
      - name: 'Install dependencies (uv)'
        run: 'uv sync --group dev --group tests --all-extras'
      - name: 'Yarn cache'
        uses: 'actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9'
        with:
          key: "${{ runner.os }}-yarn-${{ hashFiles('yarn.lock', '.yarnrc.yml') }}"
          path: '~/.yarn/berry'
          restore-keys: '${{ runner.os }}-yarn'
      - name: 'Install dependencies (Yarn)'
        run: 'yarn'
      - name: 'Lint with Pyright'
        run: 'yarn pyright'
  ruff:
    runs-on: 'ubuntu-latest'
    steps:
      - uses: 'actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0'
        with:
          persist-credentials: false
      - name: 'Lint with Ruff'
        uses: 'astral-sh/ruff-action@0ce1b0bf8b818ef400413f810f8a11cdbda0034b'
  ty:
    runs-on: 'ubuntu-latest'
    steps:
      - uses: 'actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0'
        with:
          persist-credentials: false
      - name: 'Install uv'
        uses: 'astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39'
      - name: 'Set up Python'
        uses: 'actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1'
        with:
          python-version: '3.14'
      - name: 'Install dependencies (uv)'
        run: 'uv sync --group dev --group tests --all-extras'
      - name: 'Lint with ty'
        run: 'uv run ty check'
name: 'QA'
'on':
  pull_request:
    branches:
      - 'master'
    paths:
      - '**/*.py'
      - '**/*.pyi'
      - '.github/workflows/qa.yml'
      - 'pyproject.toml'
      - 'tests/pyproject.toml'
  push:
    branches:
      - 'master'
    paths:
      - '**/*.py'
      - '**/*.pyi'
      - '.github/workflows/qa.yml'
      - 'pyproject.toml'
      - 'tests/pyproject.toml'
permissions:
  contents: 'read'
